version: "3.9"

services:
  redis:
    image: redis:8-alpine
    container_name: fx-trade-copper-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]

  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fx-trade-copper-redis-proxy
    restart: unless-stopped
    depends_on:
      - redis
    env_file:
      - .env
    ports:
      - "8080:8080"

volumes:
  redis-data:
